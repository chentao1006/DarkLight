name: Deploy static content to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Retry deploy to GitHub Pages
        id: deploy_retry
        if: steps.deploy.outcome == 'failure'
        uses: actions/deploy-pages@v5

      - name: Fail if retry also failed
        if: steps.deploy.outcome == 'failure' && steps.deploy_retry.outcome == 'failure'
        run: |
          echo "Pages deployment failed twice."
          exit 1
