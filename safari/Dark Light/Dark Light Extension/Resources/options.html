<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Dark Light Options</title>
    <link rel="stylesheet" href="options.css">
</head>

<body>
    <div class="lang-switcher-container">
        <select class="lang-switcher" id="extLangSwitcher">
            <option value="en">English</option>
            <option value="zh">简体中文</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
        </select>
    </div>

    <main class="app">
        <header class="topbar">
            <div class="brand">
                <img class="brand-icon" src="icons/icon-48.png" alt="Dark Light" width="32" height="32">
                <div>
                <h1 data-i18n="appName">Dark Light</h1>
                <p data-i18n="optionsSubtitle">Manage default appearance and site rules.</p>
                </div>
            </div>
        </header>

        <section class="section">
            <div class="default-mode-row">
                <label for="defaultMode" data-i18n="defaultMode">Default Mode</label>
                <select id="defaultMode">
                    <option value="followSystem" data-i18n="followSystem">Follow System</option>
                    <option value="preserveSite" data-i18n="preserveSite">Preserve Site Design</option>
                    <option value="forceDark" data-i18n="forceDark">Force Dark</option>
                    <option value="forceLight" data-i18n="forceLight">Force Light</option>
                </select>
            </div>
        </section>

        <section class="section">
            <div class="section-header">
                <h2 data-i18n="siteRules">Site Rules</h2>
                <button id="addRule" data-i18n="addRule">Add Rule</button>
            </div>

            <div class="rule-form hidden" id="ruleForm">
                <input id="rulePattern" type="text" data-i18n-placeholder="enterSiteDomain" placeholder="example.com">
                <select id="ruleMode">
                    <option value="inherit" data-i18n="useDefault">Use Default</option>
                    <option value="followSystem" data-i18n="followSystem">Follow System</option>
                    <option value="preserveSite" data-i18n="preserveSite">Preserve Site Design</option>
                    <option value="forceDark" data-i18n="forceDark">Force Dark</option>
                    <option value="forceLight" data-i18n="forceLight">Force Light</option>
                </select>
                <label class="inline-check">
                    <input id="ruleSubdomains" type="checkbox" checked>
                    <span data-i18n="matchSubdomains">Match subdomains</span>
                </label>
                <button id="saveRule" data-i18n="save">Save</button>
                <button id="cancelRule" class="ghost" data-i18n="cancel">Cancel</button>
            </div>

            <div id="ruleList" class="rule-list"></div>
        </section>

        <section class="section pro-section">
            <div class="section-header">
                <div>
                    <h2 data-i18n="proTitle">Dark Light Premium</h2>
                    <p id="proStatus" data-i18n="proChecking">Checking Premium status...</p>
                </div>
                <div class="pro-header-actions">
                    <button id="buyPremium" data-i18n="buyPremium">Buy Premium</button>
                </div>
            </div>

            <div class="pro-grid">
                <label class="inline-check pro-toggle">
                    <input id="iCloudSync" type="checkbox">
                    <span>
                        <strong data-i18n="iCloudSync">iCloud Sync</strong>
                        <small data-i18n="iCloudSyncDetail">Sync rules between Safari devices.</small>
                    </span>
                </label>
                <div class="pro-actions">
                    <button id="exportRules" class="ghost" data-i18n="exportRules">Export Rules</button>
                    <button id="importRules" class="ghost" data-i18n="importRules">Import Rules</button>
                    <input id="importFile" class="hidden" type="file" accept="application/json,.json">
                </div>
            </div>
        </section>
    </main>

    <script src="i18n.js"></script>
    <script src="options.js"></script>
</body>

</html>
